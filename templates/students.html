<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h1>Registered Students</h1>
<form method="GET">
    <input type="text"
           name="search"
           placeholder="Search Student"
           class="form-control mb-3">
</form>
<br>
<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Action</th>
</tr>

{% for student in students %}
<tr>
    <td>{{ student[0] }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>

    <td>
        <a href="/delete_student/{{ student[0] }}"
           class="btn btn-danger btn-sm">
           Delete
        </a>
    </td>
</tr>
{% endfor %}

</table>
<br>

<a href="/admin">Back to Admin Dashboard</a>

</body>
</html>
